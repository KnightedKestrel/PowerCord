name: ci

on:
    push:
        branches: [master]
    pull_request:
        branches: [master]

jobs:
    check-changes:
        runs-on: ubuntu-latest
        outputs:
            bot: ${{ steps.filter.outputs.bot }}
            web: ${{ steps.filter.outputs.web }}
        steps:
            - name: Check out code
              uses: actions/checkout@v6

            - name: Detect file changes
              uses: dorny/paths-filter@v4
              id: filter
              with:
                  filters: |
                      bot:
                          - 'bot/**'
                          - 'package.json'
                          - 'pnpm-lock.yaml'
                      web:
                          - 'web/**'
                          - 'package.json'
                          - 'pnpm-lock.yaml'

    lint-format:
        runs-on: ubuntu-latest
        steps:
            - name: Check out code
              uses: actions/checkout@v6

            - name: Set up pnpm
              uses: pnpm/action-setup@v4

            - name: Set up Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: '24'
                  cache: 'pnpm'

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Run ESLint
              run: pnpm run lint

            - name: Run Prettier
              run: pnpm run prettier

    bot-test:
        needs: check-changes
        if: needs.check-changes.outputs.bot == 'true'
        runs-on: ubuntu-latest
        steps:
            - name: Check out code
              uses: actions/checkout@v6

            - name: Set up pnpm
              uses: pnpm/action-setup@v4

            - name: Set up Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: '24'
                  cache: 'pnpm'

            - name: Install bot dependencies
              run: pnpm install --frozen-lockfile --filter powercord-bot

            - name: Run bot tests with coverage
              run: pnpm vitest run --coverage
              working-directory: bot

            - name: Upload bot coverage
              uses: codecov/codecov-action@v6
              with:
                  token: ${{ secrets.CODECOV_TOKEN }}
                  files: ./bot/coverage/lcov.info
                  flags: bot

    web-test:
        needs: check-changes
        if: needs.check-changes.outputs.web == 'true'
        runs-on: ubuntu-latest
        steps:
            - name: Check out code
              uses: actions/checkout@v6

            - name: Set up pnpm
              uses: pnpm/action-setup@v4

            - name: Set up Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: '24'
                  cache: 'pnpm'

            - name: Install web dependencies
              run: pnpm install --frozen-lockfile --filter powercord-web

            - name: Run web tests with coverage
              run: pnpm vitest run --coverage
              working-directory: web

            - name: Upload web coverage
              uses: codecov/codecov-action@v6
              with:
                  token: ${{ secrets.CODECOV_TOKEN }}
                  files: ./web/coverage/lcov.info
                  flags: web
